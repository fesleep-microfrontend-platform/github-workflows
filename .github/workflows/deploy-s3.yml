name: Reusable S3 Deploy

on:
  workflow_call:
    inputs:
      bucket_name:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      app_name:
        required: true
        type: string
      dist_subfolder:
        required: false
        type: string
        default: "browser"
        description: "Subfolder under dist/app_name (e.g. browser for Angular app builder)"
      role_arn:
        required: true
        type: string
    secrets:
      NPM_GITHUB_TOKEN:
        required: false
        description: Token for GitHub Packages (cross-repo private packages)

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure npm for GitHub Packages
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: echo "//npm.pkg.github.com/:_authToken=$NPM_AUTH_TOKEN" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync dist/${{ inputs.app_name }}/${{ inputs.dist_subfolder }} s3://${{ inputs.bucket_name }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/${{ inputs.app_name }}/${{ inputs.dist_subfolder }}/index.html \
            s3://${{ inputs.bucket_name }}/index.html \
            --cache-control "no-cache"
